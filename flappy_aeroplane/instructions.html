<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎉 Hidden Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:'Segoe UI',Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:30px;
}

.container{
    position:relative;
    max-width:900px;
    width:100%;
    text-align:center;
}

.logo{
    position:absolute;
    top:0;
    left:0;
    width:60px;
}

h1{
    font-size:52px;
    font-weight:900;
    margin-bottom:35px;
    background:linear-gradient(90deg,#00e5ff,#00ff99,#00e5ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.card{
    background:#111;
    border:2px solid #00e5ff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 0 25px rgba(0,229,255,.25);
}

p{
    font-size:22px;
    line-height:1.8;
    margin-bottom:30px;
}

.button{
    display:inline-block;
    margin:12px;
    padding:16px 32px;
    border-radius:999px;
    background:linear-gradient(90deg,#00e5ff,#00ff99);
    color:#000;
    font-weight:900;
    font-size:20px;
    text-decoration:none;
    transition:.25s;
}

.button:hover{
    transform:translateY(-3px) scale(1.05);
}

.footer{
    margin-top:35px;
    color:#7cffcb;
    font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<img src="../images/favicon.png" class="logo" alt="FTGames Logo">

<h1>🎉 HIDDEN GAME FOUND! 🎉</h1>

<div class="card">

<p>
Congratulations! 🥳<br>
You found one of FTGames' hidden secrets.<br><br>
You must be pretty curious... so here's a couple more buttons to explore. 👀
</p>

<a class="button" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
🎵 Secret Link #1
</a>

<a class="button" href="https://donate.stripe.com/4gMeVd0Hd65z6Gs10FaAw00?locale=en-GB&__embed_source=buy_btn_1TfXGhGCnoRB5b5RnCaLI8mq" target="_blank">
Secret Link #2
</a>

</div>

<div class="footer">
🕵️ KEEP EXPLORING • MORE SECRETS AWAIT...
</div>

</div>

</body>
</html>
