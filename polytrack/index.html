<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="theme-color" content="#000000">

    <title>Polytrack - FT Games</title>

    <link rel="icon" type="image/png" href="./favicon.ico">
    <link rel="shortcut icon" type="image/png" href="./favicon.ico">
    <link rel="apple-touch-icon" href="./favicon.ico">

    <link rel="preload" href="./forced_square.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="./images/logo.svg" as="image" type="image/svg+xml">
    <link rel="preload" href="./images/discord.svg" as="image" type="image/svg+xml">
    <link rel="manifest" href="./manifest.json">

    <style>
      html, body{ margin:0; height:100%; background:#000; color:#eaf4ff; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
      body{ overflow:hidden; }
    </style>
    <style>
      #homeButton,
    #instructionsButton{
        position:fixed;
        top:10px;
        z-index:9999999999;

        display:inline-flex;
        align-items:center;
        justify-content:center;

        padding:10px 18px;
        border-radius:14px;

        background:rgba(20,20,30,.92);
        border:2px solid #00e5ff;

        color:#fff !important;
        font:700 15px Arial,sans-serif !important;
        text-decoration:none !important;
        line-height:1;
        cursor:pointer;

        box-shadow:
            0 0 10px rgba(0,229,255,.35),
            inset 0 0 8px rgba(0,229,255,.15);

        transition:.25s ease;
        user-select:none;
    }

    #homeButton{
        right:10px;
    }

    #instructionsButton{
        left:10px;
    }

    #homeButton:hover,
    #instructionsButton:hover{
        background:linear-gradient(90deg,#00e5ff,#00ff99);
        color:#000 !important;
        box-shadow:0 0 18px rgba(0,255,170,.45);
        transform:translateY(-2px);
    }
    </style>

    <script defer="defer" src="./error_screen.bundle.js"></script>
    <script defer="defer" src="./main.bundle.js"></script>
  </head>

  <body>
    <a id="homeButton" href="https://ftgames.xyz/games">
      🏠 Home
    </a>

    <a id="instructionsButton" href="javascript:void(0)">
      📖 Instructions
    </a>
    <canvas id="screen"></canvas>
    <div id="ui"></div>
    <div id="transition-layer"></div>

  </body>
  <script>
    document.getElementById("instructionsButton").addEventListener("click", () => {
      window.open(
          "https://ftgames.xyz/polytrack/instructions",
          "instructions",
          "width=800,height=600,resizable=yes,scrollbars=yes"
      );
    });
  </script>
</html>
