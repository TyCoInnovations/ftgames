<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crossy Road on FT Games</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
    }
    .hero {
      text-align: center;
      padding: 2rem;
    }
    .hero h1 {
      margin: 0;
      font-size: clamp(2.5rem, 5vw, 5rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .hero p {
      margin: 1rem 0 0;
      font-size: 1.25rem;
      color: #94a3b8;
    }
    .hero ul {
      margin: 1.5rem auto 0;
      padding-left: 1.15rem;
      text-align: left;
      display: inline-block;
      color: #cbd5e1;
      font-size: 1rem;
      line-height: 1.75;
    }
    .hero li {
      margin-bottom: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Crossy Road</h1>
    <p>On FT Games</p>
    <ul>
      <li>Use arrow keys to move player</li>
      <li>Avoid the incoming obstacles</li>
      <li>Don't be too slow or the eagle will catch you</li>
    </ul>
  </div>
</body>
</html>
