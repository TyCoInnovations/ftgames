<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FT Games - Register</title>

    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0A0A0A 0%, #5B21B6 50%, #111827 100%);
    color: white;

    display: flex;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
    padding: 20px;
}

form {
    width: 100%;
    max-width: 500px;

    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;

    padding: 35px;

    box-shadow: 0 0 35px rgba(91, 33, 182, 0.35);
}

h2 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2rem;
}

p {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
}

/* Text Boxes */

input[type="text"],
input[type="email"],
input[type="password"] {
    width: 100%;
    padding: 13px 15px;

    background: rgba(255,255,255,0.08);
    color: white;

    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;

    font-size: 1rem;

    transition: all .3s ease;
}

input::placeholder {
    color: rgba(255,255,255,0.5);
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="password"]:focus {
    outline: none;

    border-color: #7C3AED;

    box-shadow: 0 0 18px rgba(124,58,237,.6);
}

/* Gender */

.radio-group {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.radio-group label {
    display: flex;
    align-items: center;
    gap: 8px;

    font-weight: normal;
    cursor: pointer;
}

/* Checkbox */

.checkbox-group {
    display: flex;
    align-items: flex-start;
    gap: 12px;
}

.checkbox-group input {
    margin-top: 4px;
}

.checkbox-group label {
    display: inline;
    font-weight: normal;
    line-height: 1.5;
}

/* Button */

button {
    width: 100%;

    padding: 15px;

    border: none;
    border-radius: 12px;

    background: #2D7CFF;
    color: white;

    font-size: 1.05rem;
    font-weight: bold;

    cursor: pointer;

    transition: all .3s ease;

    box-shadow:
        0 0 20px rgba(45,124,255,.45);
}

button:hover {
    transform: translateY(-3px);

    box-shadow:
        0 0 25px rgba(45,124,255,.8),
        0 0 50px rgba(45,124,255,.35);
}

/* Links */

a {
    color: #B794F4;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* Mobile */

@media (max-width: 600px) {

    form {
        padding: 25px;
    }

    h2 {
        font-size: 1.7rem;
    }

    .radio-group {
        flex-direction: column;
        gap: 12px;
    }
}
    </style>
</head>

<body>

    <form action="/submit-registration" method="POST">

        <h2>Create Your Account</h2>

        
        <p>
            <label for="username">Username</label>
            <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                required>
        </p>

        
        <p>
            <label for="email">Email Address</label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                required>
        </p>

        
        <p>
            <label for="password">Password</label>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Minimum 8 characters"
                minlength="8"
                required>
        </p>

        
        <p>
            <label>Gender</label>

            <div class="radio-group">

                <label>
                    <input type="radio" name="gender" value="male">
                    Male
                </label>

                <label>
                    <input type="radio" name="gender" value="female">
                    Female
                </label>

                <label>
                    <input type="radio" name="gender" value="other">
                    Prefer not to say
                </label>

            </div>
        </p>

        
        <p class="checkbox-group">

            <input
                type="checkbox"
                id="terms"
                name="terms"
                required>

            <label for="terms">
                I agree to the
                <a href="https://tyco.it.com/privacy-policy?back=https://ftgames.xyz/sign_up" target="_blank" rel="noopener noreferrer">
                    Privacy Policy
                </a>.
            </label>

        </p>

        
        <p>
            <button type="submit">Create Account</button>
        </p>

    </form>

</body>
</html>
