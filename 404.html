<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - FT Games</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: clamp(4rem, 12vw, 8rem);
            margin-bottom: 20px;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        p {
            max-width: 600px;
            opacity: 0.8;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .home-button {
            display: inline-block;
            padding: 16px 48px;

            background: #2d7cff;
            color: white;
            text-decoration: none;

            border-radius: 14px;
            font-weight: bold;
            font-size: 1.2rem;

            transition: transform 0.2s ease;
        }

        .home-button:hover {
            transform: translateY(-3px);
        }

        .plane {
            font-size: 4rem;
            margin-bottom: 20px;
            text-decoration: none;
            cursor: default;
        }
        
        .explosion {
            font-size: 5rem;
        }
    </style>
</head>
<body>

    <div class="plane-container">
    <a href="/flappy_aeroplane" class="plane">✈️</a>
    <span class="explosion">💥</span>
</div>

    <h1>404</h1>

    <h2>Mission Failed</h2>

    <p>
        This page has been shot down by a MIG-23, its pilot failed to eject and could not be recovered.
        Return to base and try again.
    </p>

    <a href="/" class="home-button">Return to Base</a>

</body>
</html>
