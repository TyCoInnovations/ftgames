<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FT Prime Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body {
    background: #000;
    color: gold;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 90%;
    max-width: 500px;
    border: 2px solid gold;
    padding: 48px 40px;
    text-align: center;
}

.crown {
    font-size: 70px;
    margin-bottom: 10px;
}

h1 {
    font-size: 3rem;
    margin-bottom: 10px;
}

p {
    color: white;
    margin-bottom: 30px;
    line-height: 1.6;
}

.discord-btn {
    display: inline-block;
    background: gold;
    color: #000;
    text-decoration: none;
    font-weight: 700;
    padding: 15px 32px;
    font-size: 18px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s;
}

.discord-btn:hover {
    opacity: 0.85;
}

.error-msg {
    display: none;
    margin-top: 16px;
    color: #ff4444;
    font-size: 0.875rem;
}

.secondary-link {
    display: inline-block;
    margin-top: 18px;
    color: gold;
    font-weight: 700;
    text-decoration: none;
}

.secondary-link:hover {
    opacity: 0.8;
}
</style>
</head>
<body>

<div class="card">
    <div class="crown">👑</div>

    <h1>FT Prime</h1>

    <p>
        Subscribe on Ko-fi, let your Discord role sync, then login with Discord so FT Prime can verify your access.
    </p>

    <button class="discord-btn" onclick="loginWithDiscord()">
        Login with Discord
    </button>

    <a class="secondary-link" href="/prime/subscribe.html">Need Prime first? Subscribe</a>

    <p class="error-msg" id="errorMsg"></p>
</div>

<script>
    // Show any error returned by the OAuth flow
    (function checkError() {
        const params = new URLSearchParams(window.location.search);
        const err = params.get("error");
        if (err) {
            const el = document.getElementById("errorMsg");
            const messages = {
                oauth_denied:   "Authorization was denied. Please try again.",
                token_exchange: "Login failed during token exchange. Please try again.",
                user_fetch:     "Could not retrieve your Discord profile. Please try again.",
                role_check:     "We could not verify your FT Prime Discord role. Please try again.",
            };
            el.textContent = messages[err] || "An error occurred. Please try again.";
            el.style.display = "block";
            // Clean the error from the URL
            history.replaceState({}, "", window.location.pathname);
        }
    })();

    function loginWithDiscord() {
        // Generate a random state token for CSRF protection
        const stateBytes = new Uint8Array(16);
        crypto.getRandomValues(stateBytes);
        const state = Array.from(stateBytes)
            .map((b) => b.toString(16).padStart(2, "0"))
            .join("");

        // Persist state so auth.html can verify it after the redirect
        sessionStorage.setItem("oauth_state", state);

        const params = new URLSearchParams({
            client_id:     "1516700008508948572",
            response_type: "code",
            redirect_uri:  "https://ftgames.xyz/prime/auth.html",
            scope:         "identify",
            state:         state,
        });

        location.href = "https://discord.com/oauth2/authorize?" + params.toString();
    }
</script>

</body>
</html>
