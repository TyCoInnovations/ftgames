<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FT Prime Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background:black;
    color:gold;
    font-family:Montserrat;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    border:2px solid gold;
    padding:40px;
    width:320px;
    text-align:center;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#111;
    border:1px solid gold;
    color:white;
}

button {
    width:100%;
    padding:12px;
    background:gold;
    border:none;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

h1 {
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">
    <h1>FT Prime Login</h1>

    <p>Let's get gaming.</p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="status"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

/* ✅ FIRESTORE ADDED */
import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAEyiQE_6KdvJ47g7CdVAL6XrQXX56V3MQ",
    authDomain: "ft-games-prime.firebaseapp.com",
    projectId: "ft-games-prime",
    storageBucket: "ft-games-prime.firebasestorage.app",
    messagingSenderId: "887277428440",
    appId: "1:887277428440:web:132b0b41e1bd3ca9fe81ad"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app); // ✅ FIRESTORE INIT

const status = document.getElementById("status");

window.login = async () => {
    try {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        await signInWithEmailAndPassword(auth, email, password);

        status.textContent = "Logging in...";
    } catch (e) {
        status.textContent = e.message;
    }
};

/* ✅ THIS IS THE IMPORTANT PART YOU NEEDED */
onAuthStateChanged(auth, async (user) => {
    if (user) {

        await setDoc(doc(db, "users", user.uid), {
            email: user.email,
            prime: false
        }, { merge: true });

        window.location.href = "/prime/index";
    }
});
</script>

</body>
</html>
