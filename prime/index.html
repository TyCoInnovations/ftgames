<!DOCTYPE html>
<html>
<head>
  <title>FT Prime</title>
  <script>
// Save session from URL
const params = new URLSearchParams(window.location.search);
const session = params.get("session");

if (session) {
    localStorage.setItem("ftprime_session", session);

    // Remove session from URL
    history.replaceState({}, "", window.location.pathname);
}
</script>
  <script>
(async () => {
    const session = localStorage.getItem("ftprime_session");

    if (!session) {
        window.location.href =
            "https://ftgames.tybridges44.workers.dev/login";
        return;
    }

    const res = await fetch(
        "https://ftgames.tybridges44.workers.dev/verify",
        {
            headers: {
                Authorization: session
            }
        }
    );

    const data = await res.json();

    if (!data.loggedIn || !data.prime) {
        localStorage.removeItem("ftprime_session");
        window.location.href =
            "https://ftgames.tybridges44.workers.dev/login";
    }
})();
</script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f14;
      color: white;
    }

    .loading {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .card {
      display: none;
      padding: 40px;
    }

    .title {
      font-size: 40px;
      font-weight: bold;
    }

    .sub {
      opacity: 0.7;
      margin-top: 10px;
    }

    .box {
      margin-top: 30px;
      padding: 20px;
      background: #1a1a24;
      border-radius: 10px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #ff3b7a;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="loading" id="loading">
  <h2>Verifying FT Prime...</h2>
</div>

<div class="card" id="content">
  <div class="title">FT Prime Dashboard</div>
  <div class="sub" id="userText">Welcome</div>

  <div class="box">
    <h3>Prime Status</h3>
    <p id="status">Checking...</p>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script>
async function checkAuth() {
  const session = localStorage.getItem("ftprime_session");

  if (!session) {
    window.location.href = "https://ftgames.tybridges44.workers.dev/login";
    return;
  }

  const res = await fetch("https://ftgames.tybridges44.workers.dev/verify", {
    headers: {
      Authorization: session
    }
  });

  const data = await res.json();

  if (!data.loggedIn || !data.prime) {
    localStorage.removeItem("ftprime_session");
    window.location.href = "https://ftgames.tybridges44.workers.dev/login";
    return;
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("content").style.display = "block";

  document.getElementById("status").innerText = "FT Prime ACTIVE ✅";
  document.getElementById("userText").innerText = "User ID: " + data.userId;
}

function logout() {
  localStorage.removeItem("ftprime_session");
  window.location.href = "https://ftgames.tybridges44.workers.dev/login";
}

checkAuth();
</script>

</body>
</html>
