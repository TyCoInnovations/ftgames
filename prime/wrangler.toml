name = "ftgames"
main = "prime/worker.js"
compatibility_date = "2026-06-19"

# If your dashboard worker is on workers.dev, keep workers_dev = true (default).
# If you route via a custom domain/route, define routes here instead.
workers_dev = true

# KV binding used in your code
[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_NAMESPACE_ID"
