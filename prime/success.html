<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAEyiQE_6KdvJ47g7CdVAL6XrQXX56V3MQ",
    authDomain: "ft-games-prime.firebaseapp.com",
    projectId: "ft-games-prime"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

setTimeout(() => {

    onAuthStateChanged(auth, async (user) => {

        if (!user) {
            window.location.href = "/prime/login/";
            return;
        }

        // 🔥 ONLY mark payment as pending (NOT prime)
        await setDoc(doc(db, "users", user.uid), {
            email: user.email,
            pendingStripe: true
        }, { merge: true });

        window.location.href = "/prime/";

    });

}, 2000);
</script>
