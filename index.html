<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FT Games</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 16px 24px;

            background: rgba(30, 30, 30, 0.9);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        .construction {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            text-align: center;
            height: calc(100vh - 70px);
            padding: 20px;
        }

        .panda {
            font-size: 8rem;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
            }

            .panda {
                font-size: 5rem;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="logo">FT Games</a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/games">Games</a>
            <a href="/about">About</a>
        </div>
    </nav>

    <main class="construction">
        <div class="panda">🐼🔨</div>

        <h1>Under Construction</h1>

        <p>
            We're working hard on something awesome.<br>
            Check back soon!
        </p>
    </main>

</body>
</html>
