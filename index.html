<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FT Games</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: white;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 16px 24px;

            background: rgba(30, 30, 30, 0.9);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

     .hero {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;

    min-height: calc(100vh - 70px);

    padding: 20px;
}

.hero h1 {
    font-size: clamp(3rem, 7vw, 5rem);
    margin-bottom: 24px;
}

.description {
    max-width: 700px;
    font-size: 1.25rem;
    line-height: 1.6;
    opacity: 0.8;

    margin-bottom: 40px;
}


.front-img{
 width: 300px;
 height: 400px;
border: 20px solid white;
}
        
.play-button {
    display: inline-block;

    padding: 16px 48px;

    font-size: 1.3rem;
    font-weight: bold;

    color: white;
    text-decoration: none;

    background: #2d7cff;

    border-radius: 14px;

    transition: transform 0.2s ease, opacity 0.2s ease;
}
.button-group {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
}

.donate-button {
    display: inline-block;

    padding: 16px 48px;

    font-size: 1.3rem;
    font-weight: bold;

    color: white;
    text-decoration: none;

    background: #ff4fa3;

    border-radius: 14px;

    transition: transform 0.2s ease, opacity 0.2s ease;
}

.donate-button:hover {
    transform: translateY(-3px);
    opacity: 0.9;
}
.play-button:hover {
    transform: translateY(-3px);
    opacity: 0.9;
    animation: button-move, 1s, ease-in-out;
}

@keyframes button-move{
 0%{
  transform: scale(1.0)
 }
50%{
 transform: scale(1.5)
}
   100%{
  transform: scale(1.0)
 } 
}
        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
            }
            
        }
    </style>
</head>
<body>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <nav class="navbar">
        <a href="/" class="logo">FT Games</a>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/games">Games</a>
            <a href="/about">About</a>
        </div>
    </nav>

    <main class="hero">
    <h1>Made by students, for students</h1>

    <p class="description">
        FT Games is a collection of games created by a few Year 7 students. We aim to provide experiences that are easy to access and amazing to play from anywhere.
    </p>

    <div class="button-group">
    <a href="/games" class="play-button">Play</a>

    <a
        href="https://donate.stripe.com/4gMeVd0Hd65z6Gs10FaAw00"
        class="donate-button"
        target="_blank"
        rel="noopener noreferrer"
    >
        Donate
    </a>
        <br>
        <br>
    <img src="favicon.png" class="front-img">
</div>
</main>

</body>
</html>
