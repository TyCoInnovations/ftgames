<!DOCTYPE html>
<html>
  <head>
    <title>FT Games Homepage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="splash-screen">
    <img src="images/splash.png" alt="Splash Screen">
</div>

<style>
  body {
    font-family: 'Montserrat', sans-serif;
}
#splash-screen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 99999;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    transition: opacity 0.5s ease;
}

#splash-screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>

<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        const splash = document.getElementById("splash-screen");
        splash.style.opacity = "0";

        setTimeout(() => {
            splash.remove();
        }, 500);
    }, 3000);
});
</script>
    
    <h1>Welcome to FT Games!</h1>
    <br>
    <a href="http://www.ftgames.xyz/platformer_game">Play Platformer Game</a>
    <br>
    <a href="http://www.ftgames.xyz/f111_game">Play F111 Game</a>
    <br>
      <a href="http://www.ftgames.xyz/scratch_playground">Play Scratch Playground</a>
  </body>
</html>
